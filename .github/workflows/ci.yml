name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # Rewrite SSH git URLs to HTTPS so the runner can install
      # @trustdesign/shared (a private GitHub package) using the token.
      - name: Configure git for private packages
        run: |
          git config --global url."https://x-access-token:${{ secrets.PROJECT_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${{ secrets.PROJECT_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test
      - run: npm run build

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Configure git for private packages
        run: |
          git config --global url."https://x-access-token:${{ secrets.PROJECT_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${{ secrets.PROJECT_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
